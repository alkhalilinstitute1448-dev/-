services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
    volumes:
      - backend_uploads:/app/uploads
      - backend_data:/app/data
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_data:
